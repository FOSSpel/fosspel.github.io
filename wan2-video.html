<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wan2.2 AI Video Generator — Ротация серверов FOSSpel</title>
    <meta name="description" content="Бесплатная генерация видео на базе Wan2.2. Используем несколько H100 зеркал для стабильной работы.">
    
    <style>
        body { font-family: sans-serif; margin: 0; background: #0f172a; color: white; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 15px; text-align: center; background: #1e293b; border-bottom: 1px solid #334155; }
        .container { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; position: relative; }
        footer { padding: 10px; text-align: center; font-size: 0.8rem; color: #94a3b8; }
        h1 { margin: 0; font-size: 1.2rem; color: #38bdf8; }
        
        .server-info { font-size: 0.7rem; color: #4ade80; margin-bottom: 10px; }
        .reload-btn { 
            background: #38bdf8; color: #0f172a; border: none; 
            padding: 5px 10px; border-radius: 4px; cursor: pointer; 
            font-size: 0.8rem; font-weight: bold; margin-top: 5px;
        }
        .reload-btn:hover { background: #7dd3fc; }

        iframe { border-radius: 8px; border: 1px solid #334155; background: #1e293b; }
    </style>
</head>
<body>

    <header>
        <h1>Wan2.2 AI Video Generator</h1>
        <div id="status" class="server-info">Подключение к лучшему GPU...</div>
        <button class="reload-btn" onclick="rotateServer()">Сменить сервер (если не грузит)</button>
    </header>

    <div class="container">
        <!-- Iframe без src, его подставит скрипт -->
        <iframe
            id="ai-frame"
            src=""
            frameborder="0"
            width="100%"
            height="800px"
            allow="accelerometer; ambient-light-sensor; camera; display-capture; encrypted-media; geolocation; gyroscope; microphone; midi; payment; usb; vr; xr-spatial-tracking"
            sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads"
        ></iframe>
    </div>

    <footer>
        <p>Система ротации зеркал FOSSpel. Мощности: NVIDIA H100 (Zero-GPU).</p>
    </footer>

    <script>
        // Список активных зеркал из твоего скриншота
        const mirrors = [
            "https://huggingface.co/spaces/r3gm/wan2-2-fp8da-aoti-preview/+/embed",
            "https://huggingface.co/spaces/r3gm/wan2-2-fp8da-aoti-preview2/+/embed",
            "https://huggingface.co/spaces/zerogpu-aoti/wan2-2-fp8da-aoti-faster/+/embed"
        ];

        function rotateServer() {
            const frame = document.getElementById('ai-frame');
            const status = document.getElementById('status');
            
            // Выбираем случайное зеркало
            const randomIndex = Math.floor(Math.random() * mirrors.length);
            const selectedMirror = mirrors[randomIndex];
            
            // Чтобы пользователь видел, что сервер сменился
            frame.src = ""; 
            status.innerText = "Подключение к серверу #" + (randomIndex + 1) + "...";
            
            setTimeout(() => {
                frame.src = selectedMirror;
                console.log("Загружен сервер:", selectedMirror);
            }, 100);
        }

        // Запуск при загрузке страницы
        window.onload = rotateServer;
    </script>

</body>
</html>
