<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wan2.2 API Test — FOSSpel</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 50px; }
        .box { border: 1px solid #38bdf8; padding: 20px; border-radius: 10px; display: inline-block; }
        button { background: #38bdf8; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #status { margin: 20px; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>Wan2.2 через API (Gradio Client)</h1>
    <div class="box">
        <input type="text" id="prompt" placeholder="Введите описание видео..." style="padding: 10px; width: 300px;">
        <button onclick="generateVideo()">Создать видео</button>
    </div>
    
    <div id="status">Статус: Ожидание...</div>
    <div id="result"></div>

    <!-- Подключаем клиент Gradio напрямую -->
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        window.generateVideo = async () => {
            const prompt = document.getElementById('prompt').value;
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');

            if (!prompt) return alert("Введите текст!");

            try {
                statusDiv.innerText = "Связь с сервером HF...";
                const client = await Client.connect("r3gm/wan2-2-fp8da-aoti-preview");
                
                statusDiv.innerText = "Генерация... (может занять 1-2 минуты)";
                
                // Это вызов функции модели. Параметры зависят от того, что требует модель.
                const result = await client.predict("/predict", { 
                    prompt: prompt,
                });

                console.log(result);
                statusDiv.innerText = "Готово!";
                resultDiv.innerHTML = `<video src="${result.data[0].url}" controls autoplay style="max-width: 100%;"></video>`;
            } catch (err) {
                console.error(err);
                statusDiv.innerText = "Ошибка: Сервер HF отклонил запрос или занят.";
            }
        };
    </script>
</body>
</html>
