<!DOCTYPE html>
<html>
<head>
    <title>FOSSpel API Video</title>
    <style>
        body { background: #000; color: #38bdf8; font-family: monospace; padding: 20px; text-align: center; }
        input { background: #111; border: 1px solid #38bdf8; color: #fff; padding: 10px; width: 300px; }
        button { background: #38bdf8; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #status { margin: 20px; color: #aaa; }
        video { max-width: 100%; margin-top: 20px; border: 2px solid #333; }
    </style>
</head>
<body>
    <h1>WAN 2.1 API GENERATOR</h1>
    <input type="text" id="prompt" placeholder="Введите промпт (на англ)..." value="A cat in space">
    <button onclick="generate()">GENERATE VIDEO</button>
    <div id="status">Ожидание...</div>
    <div id="result"></div>

    <script>
        const API_URL = 'https://fosspel-proxy.okuptcov4.workers.dev';

        async function generate() {
            const prompt = document.getElementById('prompt').value;
            const status = document.getElementById('status');
            status.innerText = "Шаг 1: Подключение к очереди...";

            try {
                // Отправляем запрос в очередь
                const res = await fetch(`${API_URL}/queue/join`, {
                    method: 'POST',
                    body: JSON.stringify({
                        data: [prompt, null, "1280*720", 20, 5],
                        event_data: null,
                        fn_index: 1, // Индекс функции генерации
                        trigger_id: 6
                    })
                });
                const data = await res.json();
                const hash = data.hash;

                status.innerText = "Шаг 2: Генерация (ждем поток)...";
                
                // Опрашиваем статус (упрощенно)
                const check = setInterval(async () => {
                    const statusRes = await fetch(`${API_URL}/queue/data?hash=${hash}`);
                    const statusData = await statusRes.json();
                    
                    if (statusData.status === "complete") {
                        clearInterval(check);
                        const videoUrl = statusData.output.data[0].video.url;
                        status.innerText = "Готово!";
                        document.getElementById('result').innerHTML = `<video src="${API_URL}${videoUrl}" controls autoplay></video>`;
                    } else {
                        status.innerText = "Генерируем... " + (statusData.rank ? `Очередь: ${statusData.rank}` : "");
                    }
                }, 3000);

            } catch (e) {
                status.innerText = "Ошибка: " + e.message;
            }
        }
    </script>
</body>
</html>
