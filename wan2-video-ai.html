<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wan2.2 Video Hub — FOSSpel</title>
    <style>
        body { margin: 0; background: #010409; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; color: white; }
        .nav { background: #0d1117; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #38bdf8; align-items: center; }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; background: #010409; }
        .btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 6px 15px; cursor: pointer; border-radius: 6px; }
        .btn.active { border-color: #38bdf8; color: white; background: #38bdf822; }
        .logo { font-weight: bold; color: #38bdf8; margin-right: auto; font-size: 14px; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo">FOSSpel: WAN 2.2 Hub</div>
    <button class="btn active" onclick="load('https://r3gm-wan2-2-fp8da-aoti-preview.hf.space', this)">Mirror 1</button>
    <button class="btn" onclick="load('https://r3gm-wan2-2.hf.space', this)">Mirror 2</button>
    <button class="btn" onclick="load('https://leogiscard-wan2-2-t2v.hf.space', this)">Mirror 3</button>
    <button class="btn" onclick="reset()" style="border-color: #f85149;">СБРОСИТЬ КВОТУ (F5)</button>
</div>

<iframe id="main-frame" src=""></iframe>

<script>
    const PROXY = 'https://fosspel-proxy.okuptcov4.workers.dev';
    let currentSpace = 'https://r3gm-wan2-2-fp8da-aoti-preview.hf.space';

    function load(url, btn) {
        if(btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        currentSpace = url;
        const frame = document.getElementById('main-frame');
        
        // Генерируем случайный ID сессии для воркера
        const sid = Math.floor(Math.random() * 250);
        
        // Используем технический путь /+/embed/
        frame.src = `${PROXY}/${url}/+/embed/?__theme=dark&sid=${sid}`;
    }

    function reset() {
        // Очищаем кэш и перезагружаем
        load(currentSpace, document.querySelector('.btn.active'));
    }

    window.onload = () => load(currentSpace);
</script>
</body>
</html>
