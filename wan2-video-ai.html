<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wan2.2 Video Hub — FOSSpel</title>
    <style>
        body { margin: 0; background: #010409; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; color: #c9d1d9; }
        .nav { background: #0d1117; padding: 10px; display: flex; gap: 10px; border-bottom: 2px solid #38bdf8; align-items: center; }
        iframe { flex-grow: 1; border: none; background: #010409; }
        .btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 6px 16px; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        .btn:hover { border-color: #38bdf8; color: white; }
        .btn.active { border-color: #38bdf8; color: white; background: #38bdf822; box-shadow: 0 0 10px #38bdf855; }
        .logo { font-weight: bold; color: #38bdf8; margin-right: auto; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<!-- Вставь это в блок .nav твоего HTML -->
<div class="nav">
    <div class="logo">FOSSpel AI Hub</div>
    <div class="controls">
        <button class="btn active" onclick="load('https://r3gm-wan2-2-fp8da-aoti-preview.hf.space', this)">Mirror 1 (Main)</button>
        <button class="btn" onclick="load('https://fffiloni-wan2-1-14b-fp8-t2v-test.hf.space', this)">Mirror 2 (Alt)</button>
        <button class="btn" onclick="load('https://leogiscard-wan2-2-t2v.hf.space', this)">Mirror 3 (Fresh)</button>
        <button class="btn" onclick="location.reload()" style="background:#ef4444; border:none;">RESET IP (F5)</button>
    </div>
</div>

<iframe id="target-frame" src=""></iframe>

<script>
    // ТВОЙ ВОРКЕР
    const PROXY = 'https://fosspel-proxy.okuptcov4.workers.dev';

    function load(url, btn) {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const frame = document.getElementById('target-frame');
        // Очищаем URL от слешей и формируем путь: ПРОКСИ/ЦЕЛЬ/
        const cleanUrl = url.replace(/\/+$/, "");
        frame.src = `${PROXY}/${cleanUrl}/?__theme=dark`;
    }

    // Старт
    window.onload = () => load('https://r3gm-wan2-2-fp8da-aoti-preview.hf.space', document.querySelector('.btn.active'));
</script>

</body>
</html>
