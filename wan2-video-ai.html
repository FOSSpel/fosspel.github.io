<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wan2.2 AI Video Hub — FOSSpel</title>
    <style>
        body { margin: 0; background: #010409; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; color: #c9d1d9; }
        .nav { background: #0d1117; padding: 12px 20px; display: flex; gap: 15px; border-bottom: 2px solid #38bdf8; align-items: center; flex-wrap: wrap; }
        .logo { font-weight: bold; color: #38bdf8; margin-right: auto; text-transform: uppercase; letter-spacing: 1px; font-size: 1.2rem; }
        .controls { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 8px 16px; cursor: pointer; border-radius: 6px; transition: 0.2s; font-size: 0.9rem; }
        .btn:hover { border-color: #38bdf8; color: white; }
        .btn.active { border-color: #38bdf8; color: white; background: #38bdf822; box-shadow: 0 0 10px #38bdf855; }
        .btn.reset { background: #ef4444; border-color: #ef4444; color: white; }
        .btn.reset:hover { background: #ff5555; }
        iframe { flex-grow: 1; border: none; background: #010409; }
        .status { background: #0d1117; padding: 8px 20px; font-size: 0.85rem; color: #8b949e; border-top: 1px solid #30363d; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo">FOSSpel: WAN 2.2 AI Hub</div>
    <div class="controls">
        <button class="btn active" onclick="load('https://r3gm-wan2-2-fp8da-aoti-preview.hf.space', this)">Mirror 1 (Main)</button>
        <button class="btn" onclick="load('https://r3gm-wan2-2-fp8da-aoti-preview2.hf.space', this)">Mirror 2 (Backup)</button>
        <button class="btn" onclick="load('https://fffiloni-wan2-1-14b-fp8-t2v-test.hf.space', this)">Mirror 3 (fffiloni)</button>
        <button class="btn" onclick="load('https://leogiscard-wan2-2-t2v.hf.space', this)">Mirror 4 (leogiscard)</button>
        <button class="btn" onclick="load('https://nyanko7-wan2-2.hf.space', this)">Mirror 5 (nyanko7)</button>
        <button class="btn" onclick="load('https://multimodal-art-wan2-2.hf.space', this)">Mirror 6 (multimodal)</button>
        <button class="btn reset" onclick="location.reload()">⟳ RESET IP (F5)</button>
    </div>
</div>

<iframe id="target-frame" src=""></iframe>

<div class="status" id="status-bar">
    ⚡ Прокси активен | Выберите зеркало для начала работы | Клик F5 для сброса лимитов
</div>

<script>
    // ТВОЙ ВОРКЕР
    const PROXY = 'https://fosspel-proxy.okuptcov4.workers.dev';
    let currentUrl = '';

    function load(url, btn) {
        document.querySelectorAll('.btn:not(.reset)').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const frame = document.getElementById('target-frame');
        const statusBar = document.getElementById('status-bar');
        
        // Очищаем URL от слешей и формируем путь: ПРОКСИ/ЦЕЛЬ/
        const cleanUrl = url.replace(/\/+$/, "");
        currentUrl = cleanUrl;
        frame.src = `${PROXY}/${cleanUrl}/?__theme=dark`;
        
        // Обновляем статус
        const mirrorName = btn.textContent.trim();
        statusBar.innerHTML = `✅ Загружается: ${mirrorName} | ${cleanUrl} | Прокси активен`;
    }

    // Функция для автоматического переключения при ошибке
    function checkForError() {
        const frame = document.getElementById('target-frame');
        try {
            // Пытаемся получить доступ к содержимому iframe (работает только если on same origin)
            // Вместо этого используем таймаут для проверки загрузки
            const loadTimeout = setTimeout(() => {
                const activeBtn = document.querySelector('.btn.active');
                const nextBtn = activeBtn?.nextElementSibling;
                
                // Если текущий не reset и есть следующий
                if (nextBtn && !nextBtn.classList.contains('reset')) {
                    console.log('Возможно, зеркало не отвечает, переключаем...');
                    load(nextBtn.getAttribute('onclick').match(/'([^']+)'/)[1], nextBtn);
                } else if (activeBtn) {
                    // Если дошли до конца, пробуем первое
                    const firstBtn = document.querySelector('.btn:not(.reset)');
                    load(firstBtn.getAttribute('onclick').match(/'([^']+)'/)[1], firstBtn);
                }
            }, 15000); // 15 секунд таймаут
            
            frame.addEventListener('load', () => clearTimeout(loadTimeout), { once: true });
        } catch(e) {
            console.log('Ошибка проверки:', e);
        }
    }

    // Старт
    window.onload = () => {
        load('https://r3gm-wan2-2-fp8da-aoti-preview.hf.space', document.querySelector('.btn.active'));
        
        // Добавляем обработчик для iframe
        document.getElementById('target-frame').addEventListener('load', function() {
            const statusBar = document.getElementById('status-bar');
            statusBar.innerHTML = `✅ Загружено: ${currentUrl} | Прокси активен`;
        });
        
        // Периодическая проверка (для отлова "зависших" загрузок)
        setInterval(checkForError, 10000);
    };
</script>

</body>
</html>
