<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- МАГИЯ: Запрещаем передавать Referer на Hugging Face -->
    <meta name="referrer" content="no-referrer">
    
    <title>Wan2.2 Video AI — Бесплатный доступ (Zero-Cost) | FOSSpel</title>
    
    <style>
        :root {
            --bg-color: #010409;
            --panel-color: #0d1117;
            --accent-color: #38bdf8;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --danger: #f85149;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--panel-color);
            padding: 10px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            min-width: fit-content;
        }

        .logo-area h1 {
            margin: 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
        }

        .logo-area span {
            font-size: 10px;
            color: var(--text-dim);
        }

        .mirror-grid {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: var(--text-main);
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--accent-color);
            color: white;
        }

        .btn.active {
            background-color: rgba(56, 189, 248, 0.15);
            border-color: var(--accent-color);
            color: white;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.2);
        }

        .btn-reset {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(248, 81, 73, 0.05);
        }

        .btn-reset:hover {
            background-color: var(--danger);
            color: white;
        }

        .main-container {
            flex-grow: 1;
            position: relative;
            background-color: var(--bg-color);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: var(--bg-color);
            display: block;
            transition: opacity 0.3s ease;
        }

        .loader-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-dim);
            font-size: 12px;
            z-index: -1;
        }

        @media (max-width: 800px) {
            header { flex-direction: column; height: auto; padding: 10px; }
            .mirror-grid { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>FOSSpel HUB</h1>
            <span>Wan2.2 Video (Zero-Cost)</span>
        </div>

        <div class="mirror-grid">
            <button class="btn active" onclick="loadSpace('https://r3gm-wan2-2-fp8da-aoti-preview.hf.space', this)">Mirror 1 (Turbo)</button>
            <button class="btn" onclick="loadSpace('https://r3gm-wan2-2.hf.space', this)">Mirror 2 (Stable)</button>
            <button class="btn" onclick="loadSpace('https://leogiscard-wan2-2-t2v.hf.space', this)">Mirror 3 (Fresh)</button>
            <button class="btn" onclick="loadSpace('https://fffiloni-wan2-1-t2v.hf.space', this)">Mirror 4 (Wan 2.1)</button>
            <button class="btn" onclick="loadSpace('https://nyanko7-wan2-2-t2v.hf.space', this)">Mirror 5</button>
            <button class="btn" onclick="loadSpace('https://multimodalart-wan2-2-t2v.hf.space', this)">Mirror 6</button>
        </div>

        <button class="btn btn-reset" onclick="location.reload()">СБРОС (F5)</button>
    </header>

    <div class="main-container">
        <div class="loader-text">Подключение к прокси-туннелю FOSSpel...</div>
        <iframe 
            id="ai-frame" 
            src="" 
            allow="accelerometer; gyroscope; microphone; camera; display-capture; encrypted-media; clipboard-read; clipboard-write"
            referrerpolicy="no-referrer"
        ></iframe>
    </div>

    <script>
        /**
         * КОНФИГУРАЦИЯ ПРОКСИ
         * Воркер v11 ожидает путь формата: PROXY/https://target.com/
         */
        const PROXY = 'https://fosspel-proxy.okuptcov4.workers.dev';

        function loadSpace(targetUrl, btnElement) {
            // 1. Управление активным состоянием кнопок
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');

            const frame = document.getElementById('ai-frame');
            
            // 2. Очистка целевого URL от лишних слешей
            const cleanTarget = targetUrl.replace(/\/+$/, "");
            
            // 3. Создание уникального временного штампа (для изоляции сессий в разных вкладках)
            const timestamp = new Date().getTime();
            
            // 4. Формирование финальной ссылки для Воркера v11
            // Структура: ПРОКСИ / ЦЕЛЬ / ПАРАМЕТРЫ
            const finalUrl = `${PROXY}/${cleanTarget}/?__theme=dark&t=${timestamp}`;

            console.log("FOSSpel Proxying to:", finalUrl);
            
            // Визуальный фидбек при смене зеркала
            frame.style.opacity = '0.3';
            frame.src = finalUrl;
            
            frame.onload = () => {
                frame.style.opacity = '1';
            };
        }

        // Автозагрузка первого зеркала при старте страницы
        window.onload = () => {
            const firstMirror = document.querySelector('.btn.active');
            // Если Воркер v11 уже задеплоен, это запустит систему
            loadSpace('https://r3gm-wan2-2-fp8da-aoti-preview.hf.space', firstMirror);
        };
    </script>
</body>
</html>
